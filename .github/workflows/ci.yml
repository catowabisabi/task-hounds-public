name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .

      - name: Compile Python modules
        run: |
          python -m py_compile \
            core/api/server.py \
            core/power_teams/db.py \
            core/power_teams/agents/base.py \
            core/power_teams/agents/manager.py \
            core/power_teams/agents/worker.py \
            core/power_teams/agents/reviewer.py \
            core/power_teams/mvp/runner.py

  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/web/package-lock.json

      - name: Install dashboard dependencies
        working-directory: ui/web
        run: npm ci

      - name: Build dashboard
        working-directory: ui/web
        run: npm run build
