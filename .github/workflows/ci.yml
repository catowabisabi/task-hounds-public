name: Public build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install .
      - run: python -m compileall -q core/task_hounds_api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/web/package-lock.json
      - working-directory: ui/web
        run: npm ci
      - working-directory: ui/web
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - working-directory: mobile
        run: npm ci
      - working-directory: mobile
        run: npm run build

  public-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject private runtime and database artifacts
        shell: bash
        run: |
          forbidden="$(find . -type f \( \
            -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' -o \
            -name '.env' -o -name '*.pem' -o -name '*.key' -o \
            -name '*.log' \
          \) -not -path './.git/*' -print)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden public artifacts:\n%s\n' "$forbidden"
            exit 1
          fi
          test ! -d audit_migration
          test ! -d mcp
          test ! -d docs/testing
          test ! -d docs/debug
