<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Hounds - Starting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: white;
      background: #111;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: var(--banner);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .shade {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.05) 55%);
    }

    .status {
      position: fixed;
      top: 22px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.65);
      letter-spacing: 0;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .dots span {
      animation: dot-blink 1.4s infinite;
      animation-fill-mode: both;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-blink {
      0% { opacity: 0.25; }
      20% { opacity: 1; }
      100% { opacity: 0.25; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="shade"></div>
  <div class="status">
    <div class="spinner"></div>
    <div id="statusText">
      Loading backend<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const banner = params.get("banner");
    if (banner) {
      document.documentElement.style.setProperty("--banner", `url("${banner.replaceAll("\\", "/")}")`);
    }

    if (typeof window.electronAPI !== "undefined") {
      window.electronAPI.onStatusUpdate = (status) => {
        document.getElementById("statusText").textContent = status;
      };
    }
  </script>
</body>
</html>
